<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>GameWishlist</title>
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.ico"
      type="image/x-icon"
    />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%sveltekit.assets%/favicon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%sveltekit.assets%/favicon-512.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Wishlist de jogos com busca em tempo real, favoritos salvos localmente e uma interface refinada."
    />
    <meta name="theme-color" content="#0f1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="app-shell">%sveltekit.body%</div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch((err) => {
            console.log('Service Worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
